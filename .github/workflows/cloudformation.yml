name: Deploy CloudFormation

on:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/cloudformation.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CF_DEPLOY_ROLE_ARN_SECRET: ${{ secrets.CF_DEPLOY_ROLE_ARN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ contains(secrets.AWS_ROLE_TO_ASSUME, 'arn:aws:iam::') && secrets.AWS_ROLE_TO_ASSUME || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.AWS_ROLE_TO_ASSUME) }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Bootstrap IAM roles (first run)
        if: env.CF_DEPLOY_ROLE_ARN_SECRET == ''
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CF_STACK_NAME: ${{ secrets.CF_STACK_NAME }}
          CF_BUCKET_NAME: ${{ secrets.CF_BUCKET_NAME }}
          CF_BOOTSTRAP_ONLY: "true"
        run: bash .github/scripts/deploy_cloudformation.sh

      - name: Resolve execution role ARN from stack outputs
        if: env.CF_DEPLOY_ROLE_ARN_SECRET == ''
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CF_STACK_NAME: ${{ secrets.CF_STACK_NAME }}
        run: |
          set -euo pipefail
          ROLE_ARN="$(aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name "${CF_STACK_NAME}" \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFormationExecutionRoleArn'].OutputValue" \
            --output text)"
          if [[ -z "${ROLE_ARN}" || "${ROLE_ARN}" == "None" ]]; then
            echo "Unable to resolve CloudFormationExecutionRoleArn from stack outputs."
            exit 1
          fi
          echo "CF_DEPLOY_ROLE_ARN=${ROLE_ARN}" >> "${GITHUB_ENV}"

      - name: Deploy stack
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CF_STACK_NAME: ${{ secrets.CF_STACK_NAME }}
          CF_BUCKET_NAME: ${{ secrets.CF_BUCKET_NAME }}
          CF_DEPLOY_ROLE_ARN: ${{ secrets.CF_DEPLOY_ROLE_ARN != '' && secrets.CF_DEPLOY_ROLE_ARN || env.CF_DEPLOY_ROLE_ARN }}
          CF_BOOTSTRAP_ONLY: "false"
        run: bash .github/scripts/deploy_cloudformation.sh

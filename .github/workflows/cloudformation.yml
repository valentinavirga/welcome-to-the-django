name: Deploy CloudFormation

on:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/cloudformation.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ contains(secrets.AWS_ROLE_TO_ASSUME, 'arn:aws:iam::') && secrets.AWS_ROLE_TO_ASSUME || format('arn:aws:iam::{0}:role/{1}', secrets.AWS_ACCOUNT_ID, secrets.AWS_ROLE_TO_ASSUME) }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy stack
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CF_STACK_NAME: ${{ secrets.CF_STACK_NAME }}
          CF_BUCKET_NAME: ${{ secrets.CF_BUCKET_NAME }}
        run: bash .github/scripts/deploy_cloudformation.sh

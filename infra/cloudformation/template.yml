AWSTemplateFormatVersion: "2010-09-09"
Description: Welcome to the Django - EC2 only infrastructure

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment name.
  VpcId:
    Type: String
    Description: VPC where EC2 will be deployed.
  Ec2SubnetId:
    Type: String
    Description: Public subnet for the EC2 instance.
  KeyPairName:
    Type: String
    Default: ""
    Description: Optional EC2 key pair for SSH access.
  SshCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR block allowed to connect to EC2 via SSH.
  Ec2InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance size.

Conditions:
  UseKeyPair: !Not [!Equals [!Ref KeyPairName, ""]]

Resources:
  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for the Django EC2 instance
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SshCidr
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-django-ec2-sg"
        - Key: Project
          Value: welcome-to-the-django
        - Key: Environment
          Value: !Ref EnvironmentName

  Ec2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref Ec2InstanceType
      SubnetId: !Ref Ec2SubnetId
      SecurityGroupIds:
        - !Ref Ec2SecurityGroup
      KeyName: !If [UseKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]
      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-django-ec2"
        - Key: Project
          Value: welcome-to-the-django
        - Key: Environment
          Value: !Ref EnvironmentName

Outputs:
  Ec2InstanceId:
    Description: EC2 instance ID
    Value: !Ref Ec2Instance
  Ec2PublicIp:
    Description: EC2 public IP address
    Value: !GetAtt Ec2Instance.PublicIp
  Ec2SecurityGroupId:
    Description: EC2 security group ID
    Value: !Ref Ec2SecurityGroup
AWSTemplateFormatVersion: "2010-09-09"
Description: Welcome to the Django - minimal infrastructure

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment name.
  BucketName:
    Type: String
    Default: ""
    Description: Optional S3 bucket name. Leave empty to auto-generate.
  VpcId:
    Type: String
    Default: ""
    Description: VPC where EC2 and RDS will be deployed (required when BootstrapOnly=false).
  Ec2SubnetId:
    Type: String
    Default: ""
    Description: Public subnet for the EC2 instance (required when BootstrapOnly=false).
  DbSubnetIds:
    Type: String
    Default: ""
    Description: Private subnet IDs for PostgreSQL, comma-separated (required when BootstrapOnly=false and CreateDatabase=true).
  KeyPairName:
    Type: String
    Default: ""
    Description: Optional EC2 key pair for SSH access.
  SshCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR block allowed to connect to EC2 via SSH.
  Ec2InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance size.
  DbInstanceClass:
    Type: String
    Default: db.t4g.micro
    AllowedValues:
      - db.t3.micro
      - db.t4g.micro
      - db.t4g.small
      - db.t4g.medium
    Description: RDS instance class.
  DbName:
    Type: String
    Default: appdb
    AllowedPattern: "[a-zA-Z][a-zA-Z0-9]*"
    ConstraintDescription: Must begin with a letter and contain only alphanumeric characters.
    Description: Initial PostgreSQL database name.
  DbMasterUsername:
    Type: String
    Default: postgres
    MinLength: 1
    MaxLength: 16
    AllowedPattern: "[a-zA-Z][a-zA-Z0-9]*"
    ConstraintDescription: Must begin with a letter and contain only alphanumeric characters.
    Description: Master username for PostgreSQL.
  GitHubRepository:
    Type: String
    Default: "valentinavirga/welcome-to-the-django"
    Description: GitHub repository in owner/repo format allowed to assume the OIDC deploy role.
  GitHubBranch:
    Type: String
    Default: "main"
    Description: Git branch allowed to assume the OIDC deploy role.
  BootstrapOnly:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: When true, creates only IAM bootstrap roles.
  CreateDatabase:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: When false, skips RDS resources for faster deploys.

Conditions:
  UseCustomBucketName: !Not [!Equals [!Ref BucketName, ""]]
  UseKeyPair: !Not [!Equals [!Ref KeyPairName, ""]]
  CreateAppResources: !Equals [!Ref BootstrapOnly, "false"]
  CreateDatabaseResources: !And
    - !Condition CreateAppResources
    - !Equals [!Ref CreateDatabase, "true"]

Rules:
  RequireVpcWhenAppResources:
    Assertions:
      - Assert: !Or
          - !Equals [!Ref BootstrapOnly, "true"]
          - !Not [!Equals [!Ref VpcId, ""]]
        AssertDescription: VpcId is required when BootstrapOnly=false.
  RequireEc2SubnetWhenAppResources:
    Assertions:
      - Assert: !Or
          - !Equals [!Ref BootstrapOnly, "true"]
          - !Not [!Equals [!Ref Ec2SubnetId, ""]]
        AssertDescription: Ec2SubnetId is required when BootstrapOnly=false.
  RequireDbSubnetsWhenDatabase:
    Assertions:
      - Assert: !Or
          - !Equals [!Ref BootstrapOnly, "true"]
          - !Equals [!Ref CreateDatabase, "false"]
          - !Not [!Equals [!Ref DbSubnetIds, ""]]
        AssertDescription: DbSubnetIds is required when BootstrapOnly=false and CreateDatabase=true.

Resources:
  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-deploy-aws-cloudformation"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubRepository}:ref:refs/heads/${GitHubBranch}"
      Policies:
        - PolicyName: !Sub "${EnvironmentName}-github-actions-deploy-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowCloudFormationActions
                Effect: Allow
                Action:
                  - cloudformation:*
                Resource: "*"
              - Sid: AllowEC2Actions
                Effect: Allow
                Action:
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeRouteTables
                  - ec2:CreateTags
                  - ec2:DeleteTags
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                  - ec2:DescribeInstances
                  - ec2:DescribeImages
                  - ec2:DescribeKeyPairs
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                Resource: "*"
              - Sid: AllowRDSActions
                Effect: Allow
                Action:
                  - rds:CreateDBSubnetGroup
                  - rds:ModifyDBSubnetGroup
                  - rds:DeleteDBSubnetGroup
                  - rds:DescribeDBSubnetGroups
                  - rds:CreateDBInstance
                  - rds:DeleteDBInstance
                  - rds:CreateDBSnapshot
                  - rds:DescribeDBInstances
                  - rds:ModifyDBInstance
                  - rds:DescribeDBEngineVersions
                  - rds:AddTagsToResource
                  - rds:RemoveTagsFromResource
                  - rds:ListTagsForResource
                Resource: "*"
              - Sid: AllowSecretsManagerActions
                Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:GetRandomPassword
                  - secretsmanager:UpdateSecret
                  - secretsmanager:TagResource
                  - secretsmanager:UntagResource
                Resource: "*"
              - Sid: AllowS3Actions
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:GetBucketVersioning
                  - s3:PutBucketVersioning
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketTagging
                  - s3:PutBucketTagging
                Resource: "*"
              - Sid: AllowSSMPublicAmi
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: arn:aws:ssm:*::parameter/aws/service/ami-amazon-linux-latest/*

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-cloudformation-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${EnvironmentName}-cloudformation-execution-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowCloudFormationResourceActions
                Effect: Allow
                Action:
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeRouteTables
                  - ec2:CreateTags
                  - ec2:DeleteTags
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                  - ec2:DescribeInstances
                  - ec2:DescribeImages
                  - ec2:DescribeKeyPairs
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                  - rds:CreateDBSubnetGroup
                  - rds:ModifyDBSubnetGroup
                  - rds:DeleteDBSubnetGroup
                  - rds:DescribeDBSubnetGroups
                  - rds:CreateDBInstance
                  - rds:DeleteDBInstance
                  - rds:CreateDBSnapshot
                  - rds:DescribeDBInstances
                  - rds:ModifyDBInstance
                  - rds:DescribeDBEngineVersions
                  - rds:AddTagsToResource
                  - rds:RemoveTagsFromResource
                  - rds:ListTagsForResource
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:GetRandomPassword
                  - secretsmanager:UpdateSecret
                  - secretsmanager:TagResource
                  - secretsmanager:UntagResource
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:GetBucketVersioning
                  - s3:PutBucketVersioning
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketTagging
                  - s3:PutBucketTagging
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: "*"

  AppBucket:
    Type: AWS::S3::Bucket
    Condition: CreateAppResources
    Properties:
      BucketName:
        !If [UseCustomBucketName, !Ref BucketName, !Ref "AWS::NoValue"]
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Project
          Value: welcome-to-the-django
        - Key: Environment
          Value: !Ref EnvironmentName


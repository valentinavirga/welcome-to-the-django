AWSTemplateFormatVersion: "2010-09-09"
Description: Welcome to the Django - EC2 only infrastructure

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment name.
  VpcId:
    Type: String
    Description: VPC where EC2 will be deployed.
  Ec2SubnetId:
    Type: String
    Description: Public subnet for the EC2 instance.
  Ec2SecurityGroupId:
    Type: String
    Description: Existing security group ID to attach to EC2.
  KeyPairName:
    Type: String
    Default: ""
    Description: Optional EC2 key pair for SSH access.
  Ec2InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance size.
  AmiId:
    Type: String
    Description: Amazon Linux 2023 AMI ID for the region (resolved at deploy time).

Conditions:
  UseKeyPair: !Not [!Equals [!Ref KeyPairName, ""]]

Resources:
  Ec2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref Ec2InstanceType
      SubnetId: !Ref Ec2SubnetId
      SecurityGroupIds:
        - !Ref Ec2SecurityGroupId
      KeyName: !If [UseKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]
      ImageId: !Ref AmiId
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-django-ec2"
        - Key: Project
          Value: welcome-to-the-django
        - Key: Environment
          Value: !Ref EnvironmentName

Outputs:
  Ec2InstanceId:
    Description: EC2 instance ID
    Value: !Ref Ec2Instance
  Ec2PublicIp:
    Description: EC2 public IP address
    Value: !GetAtt Ec2Instance.PublicIp
  Ec2SecurityGroupId:
    Description: EC2 security group ID
    Value: !Ref Ec2SecurityGroupId

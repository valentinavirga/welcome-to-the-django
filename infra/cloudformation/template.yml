AWSTemplateFormatVersion: "2010-09-09"
Description: Welcome to the Django - EC2 only infrastructure

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment name.
  VpcId:
    Type: String
    Description: VPC where EC2 will be deployed.
  Ec2SubnetId:
    Type: String
    Description: Public subnet for the EC2 instance.
  KeyPairName:
    Type: String
    Default: ""
    Description: Optional EC2 key pair for SSH access.
  SshCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR block allowed to connect to EC2 via SSH.
  Ec2InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance size.
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: AMI ID resolved from SSM (Amazon Linux 2023).

Conditions:
  UseKeyPair: !Not [!Equals [!Ref KeyPairName, ""]]

Resources:
  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for the Django EC2 instance
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SshCidr
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-django-ec2-sg"
        - Key: Project
          Value: welcome-to-the-django
        - Key: Environment
          Value: !Ref EnvironmentName

  Ec2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref Ec2InstanceType
      SubnetId: !Ref Ec2SubnetId
      SecurityGroupIds:
        - !Ref Ec2SecurityGroup
      KeyName: !If [UseKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]
      ImageId: !Ref AmiId
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-django-ec2"
        - Key: Project
          Value: welcome-to-the-django
        - Key: Environment
          Value: !Ref EnvironmentName

Outputs:
  Ec2InstanceId:
    Description: EC2 instance ID
    Value: !Ref Ec2Instance
  Ec2PublicIp:
    Description: EC2 public IP address
    Value: !GetAtt Ec2Instance.PublicIp
  Ec2SecurityGroupId:
    Description: EC2 security group ID
    Value: !Ref Ec2SecurityGroup
